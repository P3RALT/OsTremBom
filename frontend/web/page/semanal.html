<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semanal - Os Trem de BH</title>
    <link rel="stylesheet" href="../css/Navbar.css">
    <link rel="stylesheet" href="../css/estilosemanal.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- NAVBAR -->
    <header class="navbar">
        <div class="logo">⚡ OS TREM DE BH</div>
        <nav class="nav-links">
            <a href="../index.html">Início</a>
            <a href="../page/locais.html">Locais</a>
            <a href="../page/semanal.html">Semanal</a>
            <a href="../page/perfil.html">Perfil</a>
        </nav>
        <div class="nav-actions">
            <div class="menu-btn" onclick="toggleMenu()">☰</div>
        </div>
    </header>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="close-btn" onclick="toggleMenu()">✕</div>
            <div class="sidebar-logo">OS TREM DE BH</div>
        </div>
        <nav class="sidebar-nav">
            <a href="../index.html">Início</a>
            <a href="../page/locais.html">Locais</a>
            <a href="../page/semanal.html">Semanal</a>
            <a href="../page/perfil.html">Perfil</a>
        </nav>
        <div class="sidebar-footer">
            <button class="btn-logout">Sair</button>
        </div>
    </div>

    <!-- OVERLAY -->
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <main class="Conteudo">
        <!-- SESSÃO 01 - CARROSSEL -->
        <section class="Sessao01">
            <div class="section-header">
                <h2>Points</h2>
                <p>Os lugares mais amados pela comunidade</p>
            </div>

            <div class="Carrossel" id="carrossel-locais">
                <!-- Os cards serão inseridos aqui via JavaScript -->
            </div>
        </section>

        <!-- SESSÃO 02 - PUBLICAÇÕES -->
        <section class="SessaoPublicacoes">
            <div class="header-publicacoes">
                <h3>PUBLICAÇÕES</h3>
                <button class="btn-abrir-modal" onclick="toggleModalPublicacao()">+</button>
            </div>
            <hr class="linha-separadora">
            
            <!-- Container para as publicações -->
            <div class="publicacoes-container" id="publicacoes-container">
                <!-- As publicações serão inseridas aqui via JavaScript -->
            </div>
        </section>
    </main>

    <!-- MODAL DE PUBLICAÇÃO -->
    <div class="modal-overlay" id="modalPublicacao">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Nova Publicação</h2>
                <span class="btn-fechar" onclick="toggleModalPublicacao()">✕</span>
            </div>
            
            <form class="form-publicacao" id="formPublicacao">
                <label for="local">Onde você foi?</label>
                <select id="local" name="local" required>
                    <option value="">Selecione um local</option>
                    <option value="Mercado Central">Mercado Central</option>
                    <option value="Lagoa da Pampulha">Lagoa da Pampulha</option>
                    <option value="Praça da Liberdade">Praça da Liberdade</option>
                    <option value="Savassi">Savassi</option>
                    <option value="Mineirão">Mineirão</option>
                    <option value="Parque Municipal">Parque Municipal</option>
                </select>

                <label for="fotos">Fotos do "trem":</label>
                <input type="file" id="fotos" name="fotos" accept="image/*" multiple>

                <label for="feedback">O que achou?</label>
                <textarea id="feedback" rows="4" placeholder="Conte como foi sua experiência..." required></textarea>

                <label>Avaliação:</label>
                <div class="estrelas">
                    <input type="radio" id="star5" name="rating" value="5"><label for="star5">★</label>
                    <input type="radio" id="star4" name="rating" value="4"><label for="star4">★</label>
                    <input type="radio" id="star3" name="rating" value="3"><label for="star3">★</label>
                    <input type="radio" id="star2" name="rating" value="2"><label for="star2">★</label>
                    <input type="radio" id="star1" name="rating" value="1"><label for="star1">★</label>
                </div>

                <button type="submit" class="btn-publicar">Publicar</button>
            </form>
        </div>
    </div>

    <!-- MODAL DE VISUALIZAÇÃO DE FOTO -->
    <div class="foto-modal" id="fotoModal" onclick="fecharFotoModal()">
        <div class="foto-modal-content">
            <button class="fechar-foto" onclick="fecharFotoModal()">✕</button>
            <img id="fotoModalImg" src="" alt="Foto em destaque">
        </div>
    </div>

    <script src="../script/semanal.js"></script>
</body>
</html>
